apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: myapp
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/kchaouki/testArgo.git
    targetRevision: HEAD                               # branch/tag/commit
    path: k8s                                          # folder inside the repo that holds the manifests

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      prune: true        # delete resources removed from git
      selfHeal: true     # revert manual changes in the cluster
    syncOptions:
      - CreateNamespace=true
